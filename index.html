<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" href="./assets/logo.jpg" type="image/jpg">    
    <title>Fidget Globe Web App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="portrait-note">LANDSCAPE RECOMMENDED</div>
    <div id="viewport"><div id="ui-ring"></div></div>
    
    <div id="data-deck">
        <div class="panel-section">
            <span class="section-title">PROJECTION</span>
            <div class="row">
                <div class="input-group">
                    <label>MODE</label>
                    <select id="sel-proj">
                        <option value="0">EQUIRECTANGULAR</option>
                        <option value="1">MOLLWEIDE</option>
                        <option value="2" selected>ORTHOGRAPHIC</option>
                        <option value="3">SINUSOIDAL</option>
                        <option value="4">HAMMER</option>
                        <option value="5">MERCATOR</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="panel-section">
            <span class="section-title">TRANSFORM</span>
            <div class="row">
                <div class="input-group"><label>LON</label><input type="number" id="inp-lon" step="1"></div>
                <div class="input-group"><label>LAT</label><input type="number" id="inp-lat" step="1"></div>
                <div class="input-group"><label>ROLL</label><input type="number" id="inp-roll" step="1" value="0"></div>
                <div class="input-group"><label>GPS</label><button id="btn-locate" title="Snap to location">⌖</button></div>
                <div class="input-group"><label>CLR</label><button id="btn-reset" title="Reset to Zero">↺</button></div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="panel-section">
            <span class="section-title">LAYERS</span>
            <div class="row">
                <div class="input-group"><label>SUN</label><button id="tog-day" class="tog-btn active">ON</button></div>
                <div class="input-group"><label>GRID</label><button id="tog-grid" class="tog-btn active">ON</button></div>
            </div>
        </div>
    </div>

    <script type="importmap"> 
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } } 
    </script>
    <script type="module" src="./script.js"></script>
</body>
</html>
